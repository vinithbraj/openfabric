version: 1
name: general_purpose_assistant
description: LLM action-planning assistant with deterministic validation, tool execution, and rendering.

planner:
  temperature: 0.0

runtime:
  max_retries: 2

nodes:
  default: localhost
  endpoints:
    - name: localhost
      url: http://127.0.0.1:8787/exec

tools:
  - fs.exists
  - fs.not_exists
  - fs.copy
  - fs.read
  - fs.write
  - fs.mkdir
  - fs.list
  - fs.glob
  - fs.find
  - fs.search_content
  - fs.size
  - fs.aggregate
  - slurm.queue
  - slurm.job_detail
  - slurm.nodes
  - slurm.node_detail
  - slurm.partitions
  - slurm.accounting
  - slurm.accounting_aggregate
  - slurm.metrics
  - slurm.slurmdbd_health
  - shell.exec
  - python.exec
  - sql.query
  - sql.schema
  - sql.validate
