version: 1
name: general_purpose_assistant
description: Deterministic local assistant with explicit planning, tool execution, and validation.

planner:
  model: qwen-coder
  prompt: ../prompts/planner_system.txt
  temperature: 0.0

runtime:
  max_retries: 2

tools:
  - fs.exists
  - fs.copy
  - fs.read
  - fs.write
  - fs.mkdir
  - fs.list
  - shell.exec
  - python.exec
