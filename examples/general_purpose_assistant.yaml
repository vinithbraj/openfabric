version: 1
name: general_purpose_assistant
description: Deterministic local assistant with explicit planning, tool execution, and validation.

planner:
  model: qwen-coder
  prompt: ../prompts/planner_system.txt
  temperature: 0.0

runtime:
  max_retries: 2

nodes:
  default: localhost
  endpoints:
    - name: localhost
      url: http://127.0.0.1:8787/exec

tools:
  - fs.exists
  - fs.not_exists
  - fs.copy
  - fs.read
  - fs.write
  - fs.mkdir
  - fs.list
  - fs.find
  - fs.size
  - shell.exec
  - python.exec
  - sql.query
