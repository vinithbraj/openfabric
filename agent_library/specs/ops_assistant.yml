asdl: "0.1"

system:
  name: ops_assistant

contracts:
  UserQuestion:
    type: object
    required: [question]
    properties:
      question:
        type: string

  FileReadRequest:
    type: object
    required: [path]
    properties:
      path:
        type: string
      node:
        type: object

  FileContent:
    type: object
    required: [path, content]
    properties:
      path:
        type: string
      content:
        type: string
      node:
        type: object

  ShellExecRequest:
    type: object
    required: [command]
    properties:
      command:
        type: string
      node:
        type: object

  ShellResult:
    type: object
    required: [command, stdout, stderr, returncode]
    properties:
      command:
        type: string
      stdout:
        type: string
      stderr:
        type: string
      returncode:
        type: number
      node:
        type: object

  NotifySend:
    type: object
    required: [channel, message]
    properties:
      channel:
        type: string
      message:
        type: string
      node:
        type: object

  TaskResult:
    type: object
    required: [detail]
    properties:
      detail:
        type: string
      node:
        type: object

  NotifyResult:
    type: object
    required: [detail]
    properties:
      detail:
        type: string
      node:
        type: object

  FinalAnswer:
    type: object
    required: [answer]
    properties:
      answer:
        type: string
      node:
        type: object

events:
  user.ask:
    contract: UserQuestion
  file.read:
    contract: FileReadRequest
  file.content:
    contract: FileContent
  shell.exec:
    contract: ShellExecRequest
  shell.result:
    contract: ShellResult
  notify.send:
    contract: NotifySend
  notify.result:
    contract: NotifyResult
  task.result:
    contract: TaskResult
  answer.final:
    contract: FinalAnswer

agents:
  ops_planner:
    description: "Rule-based planner for file, shell, and notification operations."
    runtime:
      adapter: http
      endpoint: "http://localhost:8201/handle"
      autostart:
        app: agent_library.agents.operations_planner:app
    subscribes_to:
      - user.ask
    emits:
      - file.read
      - shell.exec
      - notify.send
      - task.result

  filesystem:
    description: "Reads workspace files and returns file contents."
    runtime:
      adapter: http
      endpoint: "http://localhost:8202/handle"
      autostart:
        app: agent_library.agents.filesystem:app
    subscribes_to:
      - file.read
    emits:
      - file.content
      - task.result

  shell_runner:
    description: "Executes allowlisted shell commands and returns stdout/stderr/exit status."
    runtime:
      adapter: http
      endpoint: "http://localhost:8203/handle"
      autostart:
        app: agent_library.agents.shell_runner:app
    subscribes_to:
      - shell.exec
    emits:
      - shell.result
      - task.result

  notifier:
    description: "Sends notification messages to configured channels."
    runtime:
      adapter: http
      endpoint: "http://localhost:8204/handle"
      autostart:
        app: agent_library.agents.notifier:app
    subscribes_to:
      - notify.send
    emits:
      - notify.result

  synthesizer:
    description: "Builds final user-facing answers from tool results."
    runtime:
      adapter: http
      endpoint: "http://localhost:8205/handle"
      autostart:
        app: agent_library.agents.synthesizer:app
    subscribes_to:
      - file.content
      - shell.result
      - notify.result
      - task.result
    emits:
      - answer.final

execution:
  mode: event-driven
