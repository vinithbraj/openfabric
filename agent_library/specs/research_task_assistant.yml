asdl: "0.1"

system:
  name: research_task_assistant

contracts:
  UserQuestion:
    type: object
    required: [question]
    properties:
      question:
        type: string

  SearchQuery:
    type: object
    required: [query]
    properties:
      query:
        type: string
      node:
        type: object

  SearchResult:
    type: object
    required: [content]
    properties:
      content:
        type: string
      node:
        type: object

  TaskPlan:
    type: object
    required: [task]
    properties:
      task:
        type: string
      node:
        type: object

  TaskResult:
    type: object
    required: [detail]
    properties:
      detail:
        type: string
      node:
        type: object

  FinalAnswer:
    type: object
    required: [answer]
    properties:
      answer:
        type: string
      node:
        type: object

events:
  user.ask:
    contract: UserQuestion
  research.query:
    contract: SearchQuery
  research.result:
    contract: SearchResult
  task.plan:
    contract: TaskPlan
  task.result:
    contract: TaskResult
  answer.final:
    contract: FinalAnswer

agents:
  planner:
    description: "Plans whether a request should trigger research, task execution, or both."
    runtime:
      adapter: http
      endpoint: "http://localhost:8101/handle"
      autostart:
        app: agent_library.agents.planner:app
    subscribes_to:
      - user.ask
    emits:
      - research.query
      - task.plan

  retriever:
    description: "Fetches research content for research queries."
    runtime:
      adapter: http
      endpoint: "http://localhost:8102/handle"
      autostart:
        app: agent_library.agents.retriever:app
    subscribes_to:
      - research.query
    emits:
      - research.result

  calculator:
    description: "Performs arithmetic tasks from task plans."
    runtime:
      adapter: http
      endpoint: "http://localhost:8103/handle"
      autostart:
        app: agent_library.agents.calculator:app
    subscribes_to:
      - task.plan
    emits:
      - task.result

  synthesizer:
    description: "Builds final user-facing answers from research and task results."
    runtime:
      adapter: http
      endpoint: "http://localhost:8104/handle"
      autostart:
        app: agent_library.agents.synthesizer:app
    subscribes_to:
      - research.result
      - task.result
    emits:
      - answer.final

execution:
  mode: event-driven
