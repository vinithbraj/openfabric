asdl: "0.1"

system:
  name: ops_assistant_llm

arguments:
  agents:
    sql_runner:
      - name: mydb
        port: 8307
        description: "Read-only SQL database agent for the Postgres database 'mydb'."
        env:
          SQL_AGENT_DSN: "${SQL_DATABASE_URL:-postgresql://admin:admin123@127.0.0.1:5432/mydb}"
          SQL_AGENT_NAME: "mydb"
          SQL_AGENT_MAX_REPAIR_ATTEMPTS: "${SQL_AGENT_MAX_REPAIR_ATTEMPTS:-10}"
        metadata:
          database_name: "mydb"
          database_aliases:
            - "mydb"
          routing_priority: 10
          routing_hints:
            - "default app database"
            - "general relational data"
            - "core sample database"
          routing_notes:
            - "Use this SQL agent for requests that mention database 'mydb'."
            - "Use this SQL agent for schema introspection and read-only data questions for mydb."
      - name: dicom_mock
        port: 8308
        description: "Read-only SQL database agent for the Postgres database 'dicom_mock'."
        env:
          SQL_AGENT_DSN: "${SQL_DICOM_MOCK_DATABASE_URL:-postgresql://admin:admin123@127.0.0.1:5432/dicom_mock}"
          SQL_AGENT_NAME: "dicom_mock"
          SQL_AGENT_MAX_REPAIR_ATTEMPTS: "${SQL_AGENT_MAX_REPAIR_ATTEMPTS:-10}"
        metadata:
          database_name: "dicom_mock"
          database_aliases:
            - "dicom_mock"
            - "dicom mock"
          routing_priority: 50
          routing_hints:
            - "dicom imaging patients studies series instances mrn modality"
            - "radiology oncology rtplan rtstruct rtdose dicom tags"
            - "primary healthcare dataset"
          routing_notes:
            - "Use this SQL agent for requests that mention database 'dicom_mock'."
            - "Use this SQL agent for schema introspection and read-only data questions for dicom_mock."
    slurm_runner:
      - name: cluster
        port: 8309
        description: "Slurm scheduler agent that talks to a remote Slurm gateway."
        env:
          SLURM_GATEWAY_HOST: "${SLURM_GATEWAY_HOST:-127.0.0.1}"
          SLURM_GATEWAY_PORT: "${SLURM_GATEWAY_PORT:-8312}"
          SLURM_GATEWAY_SCHEME: "${SLURM_GATEWAY_SCHEME:-http}"
        metadata:
          cluster_name: "default"
          cluster_aliases:
            - "slurm"
            - "cluster"
            - "hpc"

contracts:
  UserQuestion:
    type: object
    required: [question]
    properties:
      question:
        type: string

  agent_execution_request:
    type: object
    properties:
      node:
        type: object
      task:
        type: string
      original_task:
        type: string
      instruction:
        type: object
      context:
        type: object
      policy:
        type: object
      artifacts:
        type: array
        items:
          type: object

  agent_execution_result:
    type: object
    properties:
      node:
        type: object
      status:
        type: string
      api:
        type: string
      detail:
        type: string
      raw_output:
        type: object
      structured_output:
        type: object
      artifacts:
        type: array
        items:
          type: object
      reduction_request:
        type: object
      error: {}
      metrics:
        type: object

  FileReadRequest:
    type: object
    required: [path]
    properties:
      path:
        type: string
      node:
        type: object

  FileContent:
    type: object
    required: [path, content]
    properties:
      path:
        type: string
      content:
        type: string
      node:
        type: object

  ShellExecRequest:
    type: object
    required: [command]
    properties:
      command:
        type: string
      node:
        type: object

  ShellResult:
    type: object
    required: [command, stdout, stderr, returncode]
    properties:
      command:
        type: string
      stdout:
        type: string
      stderr:
        type: string
      returncode:
        type: number
      reduction_request:
        type: object
      node:
        type: object

  SqlQuery:
    type: object
    properties:
      question:
        type: string
      query:
        type: string
      sql:
        type: string

  SlurmQuery:
    type: object
    properties:
      question:
        type: string
      query:
        type: string
      command:
        type: string
      args:
        type: array
        items:
          type: string

  SqlResult:
    type: object
    required: [detail]
    properties:
      detail:
        type: string
      sql:
        type: string
      schema:
        type: object
      stats:
        type: object
      result: {}
      reduction_request:
        type: object
      node:
        type: object

  SlurmResult:
    type: object
    required: [detail]
    properties:
      detail:
        type: string
      command:
        type: string
      stdout:
        type: string
      stderr:
        type: string
      returncode:
        type: number
      stats:
        type: object
      result: {}
      reduction_request:
        type: object
      node:
        type: object

  NotifySend:
    type: object
    required: [channel, message]
    properties:
      channel:
        type: string
      message:
        type: string
      node:
        type: object

  TaskPlan:
    type: object
    required: [task]
    properties:
      task:
        type: string
      run_id:
        type: string
      attempt:
        type: number
      resume_run_id:
        type: string
      task_shape:
        type: string
      retry_budget:
        type: object
        properties:
          max_attempts:
            type: number
          max_replans:
            type: number
          max_uncertain_attempts:
            type: number
          max_validation_llm_calls:
            type: number
      step_id:
        type: string
      original_task:
        type: string
      target_agent:
        type: string
      node:
        type: object
      presentation:
        type: object
        properties:
          task:
            type: string
          format:
            type: string
          audience:
            type: string
          include_context:
            type: boolean
          include_internal_steps:
            type: boolean
      steps:
        type: array
        items:
          type: object
          required: [id, task]
          properties:
            id:
              type: string
            target_agent:
              type: string
            task:
              type: string
            instruction:
              type: object
            command:
              type: string
            result_mode:
              type: string
            depends_on:
              type: array
              items:
                type: string
            when:
              type: object
            steps:
              type: array
              items:
                type: object

  TaskResult:
    type: object
    required: [detail]
    properties:
      detail:
        type: string
      status:
        type: string
      error:
        type: string
      result: {}
      replan_hint:
        type: object
        properties:
          reason:
            type: string
          failure_class:
            type: string
          partial_result: {}
          missing_information:
            type: array
            items:
              type: string
          suggested_capabilities:
            type: array
            items:
              type: string
      node:
        type: object

  PlannerReplanRequest:
    type: object
    required: [task, step_id, reason]
    properties:
      task:
        type: string
      task_shape:
        type: string
      step_id:
        type: string
      original_task:
        type: string
      target_agent:
        type: string
      reason:
        type: string
      failure_class:
        type: string
      event:
        type: string
      error:
        type: string
      available_context:
        type: object
      validation:
        type: object
      partial_result: {}
      presentation:
        type: object

  PlannerReplanResult:
    type: object
    required: [replace_step_id, steps]
    properties:
      replace_step_id:
        type: string
      reason:
        type: string
      steps:
        type: array
        items:
          type: object
      node:
        type: object

  ClarificationRequired:
    type: object
    required: [task, detail]
    properties:
      task:
        type: string
      run_id:
        type: string
      task_shape:
        type: string
      step_id:
        type: string
      detail:
        type: string
      question:
        type: string
      missing_information:
        type: array
        items:
          type: string
      available_context:
        type: object
      persistence:
        type: object
      graph:
        type: object

  PlanProgress:
    type: object
    required: [stage, message]
    properties:
      stage:
        type: string
      message:
        type: string
      task_shape:
        type: string
      steps:
        type: array
        items:
          type: object
      presentation:
        type: object
      node:
        type: object

  ValidationRequest:
    type: object
    required: [task, workflow_status]
    properties:
      run_id:
        type: string
      validation_scope:
        type: string
      task:
        type: string
      original_task:
        type: string
      task_shape:
        type: string
      validation_llm_budget_remaining:
        type: number
      attempt:
        type: number
      total_attempts:
        type: number
      option_id:
        type: string
      option_label:
        type: string
      option_reason:
        type: string
      workflow_status:
        type: string
      step_id:
        type: string
      step_task:
        type: string
      step_target_agent:
        type: string
      step_event:
        type: string
      steps:
        type: array
        items:
          type: object
      result: {}
      step_value: {}
      error:
        type: string
      presentation:
        type: object
      available_context:
        type: object
      node:
        type: object

  ValidationResult:
    type: object
    required: [valid, reason, retry_recommended]
    properties:
      valid:
        type: boolean
      verdict:
        type: string
      reason:
        type: string
      retry_recommended:
        type: boolean
      missing_requirements:
        type: array
        items:
          type: string
      trace:
        type: array
        items:
          type: string
      node:
        type: object

  ValidationProgress:
    type: object
    required: [stage, task, message]
    properties:
      stage:
        type: string
      task:
        type: string
      message:
        type: string
      option_id:
        type: string
      option_label:
        type: string
      attempt:
        type: number
      total_attempts:
        type: number
      reason:
        type: string
      trace:
        type: array
        items:
          type: string

  StepProgress:
    type: object
    required: [stage, step_id, message]
    properties:
      stage:
        type: string
      step_id:
        type: string
      target_agent:
        type: string
      task:
        type: string
      message:
        type: string
      command:
        type: string
      stdout:
        type: string
      stdout_excerpt:
        type: string
      stderr:
        type: string
      stderr_excerpt:
        type: string
      sql:
        type: string
      event:
        type: string
      duration_ms:
        type: number
      result: {}
      error:
        type: string
      local_reduction_command:
        type: string
      node:
        type: object
      reduction:
        type: object

  DataReduceRequest:
    type: object
    required: [task, step_id, source_event]
    properties:
      run_id:
        type: string
      attempt:
        type: number
      task:
        type: string
      original_task:
        type: string
      step_id:
        type: string
      target_agent:
        type: string
      source_event:
        type: string
      reduction_request:
        type: object
      local_reduction_command:
        type: string
      existing_reduced_result: {}
      input_data: {}
      source_value: {}
      source_payload:
        type: object
      available_context:
        type: object
      node:
        type: object

  DataReducedResult:
    type: object
    required: [step_id, source_event, strategy]
    properties:
      step_id:
        type: string
      task:
        type: string
      original_task:
        type: string
      target_agent:
        type: string
      source_event:
        type: string
      detail:
        type: string
      reduced_result: {}
      strategy:
        type: string
      attempts:
        type: number
      local_reduction_command:
        type: string
      error:
        type: string
      node:
        type: object

  NotifyResult:
    type: object
    required: [detail]
    properties:
      detail:
        type: string
      node:
        type: object

  WorkflowResult:
    type: object
    required: [task, status, steps]
    properties:
      task:
        type: string
      run_id:
        type: string
      task_shape:
        type: string
      status:
        type: string
      steps:
        type: array
        items:
          type: object
      result: {}
      error:
        type: string
      presentation:
        type: object
      persistence:
        type: object
      graph:
        type: object
      node:
        type: object

  FinalAnswer:
    type: object
    required: [answer]
    properties:
      answer:
        type: string
      node:
        type: object

  SystemCapabilities:
    type: object
    required: [agents]
    properties:
      agents:
        type: array
        items:
          type: object
          required: [name, description, methods, adapter, endpoint, subscribes_to, emits]
          properties:
            name:
              type: string
            contract_version:
              type: string
            role:
              type: string
            description:
              type: string
            methods:
              type: array
              items:
                type: object
                required: [name, event]
                properties:
                  name:
                    type: string
                  event:
                    type: string
                  trigger_event:
                    type: string
                  emits:
                    type: array
                    items:
                      type: string
                  when:
                    type: string
                  request_contract:
                    type: string
                  result_contract:
                    type: string
                  request_envelope_fields:
                    type: array
                    items:
                      type: string
                  result_envelope_fields:
                    type: array
                    items:
                      type: string
            apis:
              type: array
              items:
                type: object
                required: [name, trigger_event]
                properties:
                  name:
                    type: string
                  event:
                    type: string
                  trigger_event:
                    type: string
                  emits:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  when:
                    type: string
                  request_contract:
                    type: string
                  result_contract:
                    type: string
                  request_envelope_fields:
                    type: array
                    items:
                      type: string
                  result_envelope_fields:
                    type: array
                    items:
                      type: string
                  input_schema:
                    type: object
                  output_schema:
                    type: object
            adapter:
              type: string
            endpoint:
              type: string
            subscribes_to:
              type: array
            emits:
              type: array
            request_schema:
              type: object
            result_schema:
              type: object
            request_contract:
              type: string
            result_contract:
              type: string
            request_envelope_fields:
              type: array
              items:
                type: string
            result_envelope_fields:
              type: array
              items:
                type: string
      execution_policy:
        type: object
      graph:
        type: object

events:
  system.capabilities:
    contract: SystemCapabilities
  user.ask:
    contract: UserQuestion
  file.read:
    contract: FileReadRequest
  file.content:
    contract: FileContent
  shell.exec:
    contract: ShellExecRequest
  shell.result:
    contract: ShellResult
  sql.query:
    contract: SqlQuery
  sql.result:
    contract: SqlResult
  slurm.query:
    contract: SlurmQuery
  slurm.result:
    contract: SlurmResult
  notify.send:
    contract: NotifySend
  notify.result:
    contract: NotifyResult
  data.reduce:
    contract: DataReduceRequest
  data.reduced:
    contract: DataReducedResult
  task.plan:
    contract: TaskPlan
  task.result:
    contract: TaskResult
  planner.replan.request:
    contract: PlannerReplanRequest
  planner.replan.result:
    contract: PlannerReplanResult
  clarification.required:
    contract: ClarificationRequired
  plan.progress:
    contract: PlanProgress
  step.progress:
    contract: StepProgress
  workflow.result:
    contract: WorkflowResult
  validation.request:
    contract: ValidationRequest
  validation.result:
    contract: ValidationResult
  validation.progress:
    contract: ValidationProgress
  answer.final:
    contract: FinalAnswer

agents:
  ops_planner:
    description: "LLM planner that decides if a request is processable and broadcasts task plans."
    methods:
      - name: assess_processable_request
        event: task.plan
        when: "Broadcast when request can be processed by at least one capability."
      - name: describe_execution_plan
        event: plan.progress
        when: "Emit user-visible planning progress before execution begins."
      - name: reject_unprocessable_request
        event: task.result
        when: "Emit when request is not processable by discovered capabilities."
      - name: decompose_failed_step
        event: planner.replan.result
        when: "Emit a replacement subplan when an executing step requests further breakdown."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8301/handle"
      timeout_seconds: 300
      autostart:
        app: agent_library.agents.llm_operations_planner:app
    subscribes_to:
      - system.capabilities
      - user.ask
      - planner.replan.request
    emits:
      - plan.progress
      - task.plan
      - task.result
      - planner.replan.result

  shell_runner:
    description: "Executes bash commands and returns stdout/stderr/exit status."
    methods:
      - name: execute_bash_command
        event: task.plan
        when: "Runs bash command strings derived from task plans and emits shell execution result."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8303/handle"
      autostart:
        app: agent_library.agents.bash_executor:app
    subscribes_to:
      - shell.exec
      - task.plan
    emits:
      - shell.result
      - task.result

  sql_runner:
    description: "Read-only SQL database agent for schema introspection, SQL generation, and query execution."
    methods:
      - name: introspect_database
        event: task.plan
        when: "Lists database schemas, tables, columns, and relationships."
      - name: answer_database_question
        event: task.plan
        when: "Generates and executes read-only SQL for natural-language database questions."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8307/handle"
      autostart:
        app: agent_library.agents.sql_runner:app
    subscribes_to:
      - sql.query
      - task.plan
    emits:
      - sql.result
      - task.result

  slurm_runner:
    description: "Remote Slurm agent for scheduler queries and control via an HTTP gateway."
    methods:
      - name: query_slurm_from_request
        event: task.plan
        when: "Generates and executes one Slurm gateway command for a natural-language scheduler request."
      - name: execute_explicit_slurm_command
        event: slurm.query
        when: "Executes an explicit Slurm command through the remote gateway."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8309/handle"
      autostart:
        app: agent_library.agents.slurm_runner:app
    subscribes_to:
      - slurm.query
      - task.plan
    emits:
      - slurm.result
      - task.result

  notifier:
    description: "Sends notification messages to configured channels."
    methods:
      - name: send_notification
        event: task.plan
        when: "Sends notification payloads derived from task plans."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8304/handle"
      autostart:
        app: agent_library.agents.notifier:app
    subscribes_to:
      - notify.send
      - task.plan
    emits:
      - notify.result

  data_reducer:
    description: "Reduces raw executor outputs into smaller summaries before validation using a structured reduction request or a direct local reducer command."
    methods:
      - name: reduce_step_output
        event: data.reduce
        when: "Executes a shared reduction request or a direct local reducer command for a completed step."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8313/handle"
      autostart:
        app: agent_library.agents.data_reducer:app
    subscribes_to:
      - data.reduce
    emits:
      - data.reduced

  synthesizer:
    description: "Builds final user-facing answers from tool results."
    methods:
      - name: synthesize_file_result
        event: file.content
        when: "Converts file content into final answer."
      - name: synthesize_shell_result
        event: shell.result
        when: "Converts shell execution result into final answer."
      - name: synthesize_notify_result
        event: notify.result
        when: "Converts notify result into final answer."
      - name: synthesize_sql_result
        event: sql.result
        when: "Converts SQL schema/query results into final answer."
      - name: synthesize_slurm_result
        event: slurm.result
        when: "Converts Slurm command results into final answer."
      - name: synthesize_task_result
        event: task.result
        when: "Converts generic task result into final answer."
      - name: synthesize_workflow_result
        event: workflow.result
        when: "Converts aggregated multi-step workflow results into final answer."
      - name: synthesize_clarification_required
        event: clarification.required
        when: "Converts clarification requests into a user-facing follow-up question."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8305/handle"
      autostart:
        app: agent_library.agents.synthesizer:app
    subscribes_to:
      - file.content
      - shell.result
      - sql.result
      - slurm.result
      - notify.result
      - task.result
      - workflow.result
      - clarification.required
    emits:
      - answer.final

  validator:
    description: "Validates whether a workflow attempt satisfied the user's request and whether fallback options should be tried."
    methods:
      - name: validate_workflow_attempt
        event: validation.result
        when: "Scores each workflow attempt against the original task and recommends retrying when needed."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8311/handle"
      autostart:
        app: agent_library.agents.validator:app
    subscribes_to:
      - validation.request
    emits:
      - validation.result

execution:
  mode: event-driven
