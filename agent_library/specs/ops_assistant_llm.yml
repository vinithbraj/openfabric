asdl: "0.1"

system:
  name: ops_assistant_llm

contracts:
  UserQuestion:
    type: object
    required: [question]
    properties:
      question:
        type: string

  FileReadRequest:
    type: object
    required: [path]
    properties:
      path:
        type: string

  FileContent:
    type: object
    required: [path, content]
    properties:
      path:
        type: string
      content:
        type: string

  ShellExecRequest:
    type: object
    required: [command]
    properties:
      command:
        type: string

  ShellResult:
    type: object
    required: [command, stdout, stderr, returncode]
    properties:
      command:
        type: string
      stdout:
        type: string
      stderr:
        type: string
      returncode:
        type: number

  NotifySend:
    type: object
    required: [channel, message]
    properties:
      channel:
        type: string
      message:
        type: string

  TaskPlan:
    type: object
    required: [task]
    properties:
      task:
        type: string

  TaskResult:
    type: object
    required: [detail]
    properties:
      detail:
        type: string

  NotifyResult:
    type: object
    required: [detail]
    properties:
      detail:
        type: string

  FinalAnswer:
    type: object
    required: [answer]
    properties:
      answer:
        type: string

  SystemCapabilities:
    type: object
    required: [agents]
    properties:
      agents:
        type: array
        items:
          type: object
          required: [name, description, methods, adapter, endpoint, subscribes_to, emits]
          properties:
            name:
              type: string
            description:
              type: string
            methods:
              type: array
              items:
                type: object
                required: [name, event]
                properties:
                  name:
                    type: string
                  event:
                    type: string
                  when:
                    type: string
            adapter:
              type: string
            endpoint:
              type: string
            subscribes_to:
              type: array
            emits:
              type: array

events:
  system.capabilities:
    contract: SystemCapabilities
  user.ask:
    contract: UserQuestion
  file.read:
    contract: FileReadRequest
  file.content:
    contract: FileContent
  shell.exec:
    contract: ShellExecRequest
  shell.result:
    contract: ShellResult
  notify.send:
    contract: NotifySend
  notify.result:
    contract: NotifyResult
  task.plan:
    contract: TaskPlan
  task.result:
    contract: TaskResult
  answer.final:
    contract: FinalAnswer

agents:
  ops_planner:
    description: "LLM planning agent that maps user requests into allowed tool events."
    methods:
      - name: plan_file_read
        event: file.read
        when: "Use for reading/opening files from user request."
      - name: plan_shell_command
        event: shell.exec
        when: "Use for shell command execution requests."
      - name: plan_notification
        event: notify.send
        when: "Use for notify/alert requests."
      - name: plan_arithmetic_task
        event: task.plan
        when: "Use for arithmetic operations such as add/subtract/multiply/divide."
      - name: planner_fallback
        event: task.result
        when: "Use only when no actionable tool event applies."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8301/handle"
      timeout_seconds: 30
      autostart:
        app: agent_library.agents.llm_operations_planner:app
    subscribes_to:
      - system.capabilities
      - user.ask
    emits:
      - file.read
      - shell.exec
      - notify.send
      - task.plan
      - task.result

  filesystem:
    description: "Reads workspace files and returns file contents."
    methods:
      - name: read_workspace_file
        event: file.read
        when: "Reads a relative file path from workspace and emits file content."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8302/handle"
      autostart:
        app: agent_library.agents.filesystem:app
    subscribes_to:
      - file.read
    emits:
      - file.content
      - task.result

  shell_runner:
    description: "Executes bash commands and returns stdout/stderr/exit status."
    methods:
      - name: execute_bash_command
        event: shell.exec
        when: "Runs bash command strings and emits shell execution result."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8303/handle"
      autostart:
        app: agent_library.agents.bash_executor:app
    subscribes_to:
      - shell.exec
    emits:
      - shell.result
      - task.result

  notifier:
    description: "Sends notification messages to configured channels."
    methods:
      - name: send_notification
        event: notify.send
        when: "Sends notification payloads to configured notification channel."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8304/handle"
      autostart:
        app: agent_library.agents.notifier:app
    subscribes_to:
      - notify.send
    emits:
      - notify.result

  calculator:
    description: "Performs arithmetic tasks from task plans and emits task results."
    methods:
      - name: compute_basic_math
        event: task.plan
        when: "Computes add/subtract/multiply/divide from natural-language task plans."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8306/handle"
      autostart:
        app: agent_library.agents.calculator:app
    subscribes_to:
      - task.plan
    emits:
      - task.result

  synthesizer:
    description: "Builds final user-facing answers from tool results."
    methods:
      - name: synthesize_file_result
        event: file.content
        when: "Converts file content into final answer."
      - name: synthesize_shell_result
        event: shell.result
        when: "Converts shell execution result into final answer."
      - name: synthesize_notify_result
        event: notify.result
        when: "Converts notify result into final answer."
      - name: synthesize_task_result
        event: task.result
        when: "Converts generic task result into final answer."
    runtime:
      adapter: http
      endpoint: "http://127.0.0.1:8305/handle"
      autostart:
        app: agent_library.agents.synthesizer:app
    subscribes_to:
      - file.content
      - shell.result
      - notify.result
      - task.result
    emits:
      - answer.final

execution:
  mode: event-driven
